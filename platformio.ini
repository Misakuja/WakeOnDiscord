; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[env:waveshare_esp32-s3-qio-psram]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Serial Monitor Configuration ---
; The monitor port potentially not needed, I need it for my laptop
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; --- Flash Configuration (8MB QIO) ---
; This is for the 8MB Flash, which is also QIO/Quad SPI
board_build.flash_mode = qio
board_build.flash_size = 8MB

; --- PSRAM Configuration (8MB, OPI) ---
board_build.psram_type = opi
board_build.extra_flags = -DBOARD_HAS_PSRAM

board_build.arduino.memory_type = qio_opi

monitor_rts = 0
monitor_dtr = 0

; --- Force TFT_eSPI to use our local setup file ---
build_flags =
    -DUSER_SETUP_LOADED=1
    -DUSE_HSPI_PORT=1
    -DBOARD_HAS_PSRAM=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0

; --- SSL/TLS Memory Optimizations for Discord ---
    -DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
    -DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096
    -DCONFIG_MBEDTLS_DYNAMIC_BUFFER=1
    -DCONFIG_MBEDTLS_CERTIFICATE_BUNDLE=0
    -DCONFIG_MBEDTLS_SSL_ALLOW_PSRAM=1
    -DCONFIG_SPIRAM_USE_CAPS_ALLOC=1
    -DCONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY=1

lib_deps =
    a7md0/WakeOnLan@^1.1.7
    links2004/WebSockets@^2.7.3
    bblanchon/ArduinoJson@^6.21.0
    adafruit/Adafruit NeoPixel@^1.15.4
